<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Order Punching</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">🥛 Order Punch</div>
      <div class="login-sub">Fresh Division · Sales Order System</div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@company.com" autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>
      <div id="login-error"></div>
      <button class="btn btn-primary" id="login-btn" style="width:100%;margin-top:20px;padding:10px;">
        Sign in
      </button>
    </div>
  </div>

  <script>
    const API = "http://localhost:8000";

    // Redirect if already logged in
    if (localStorage.getItem("token")) {
      window.location.href = "../index.html";
    }

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const err = document.getElementById("login-error");
      const btn = document.getElementById("login-btn");

      if (!email || !password) { err.textContent = "Enter email and password."; return; }

      btn.disabled = true; btn.textContent = "Signing in…";
      err.textContent = "";

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) { err.textContent = data.detail || "Invalid credentials."; return; }
        localStorage.setItem("token", data.token);
        localStorage.setItem("name", data.name);
        localStorage.setItem("role", data.role);
        window.location.href = "../index.html";
      } catch {
        err.textContent = "Cannot connect to server.";
      } finally {
        btn.disabled = false; btn.textContent = "Sign in";
      }
    }

    document.getElementById("login-btn").addEventListener("click", login);
    document.addEventListener("keydown", e => { if (e.key === "Enter") login(); });
  </script>
</body>
</html>
